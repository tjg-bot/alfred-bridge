# fly.toml app configuration file generated for alfred-bridge-tareda on 2026-07-06T22:56:39Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'alfred-bridge-tareda'
primary_region = 'yyz'
kill_signal = 'SIGTERM'
kill_timeout = '8s'

[build]
  dockerfile = 'Dockerfile'

[env]
  BRIDGE_AUTH_PATH = '/data/auth-state'
  BRIDGE_LOG_LEVEL = 'info'
  NODE_ENV = 'production'
  PORT = '8080'

[[mounts]]
  source = 'alfred_auth'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
