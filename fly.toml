# Fly.io deployment config for Alfred WhatsApp Bridge
#
# One machine, always on. Persistent volume for Baileys auth session so
# the QR pair survives restarts. Auto-restart on crash.
#
# Region YYZ = Toronto (matches Alfred's Public Mobile Toronto number).
#
# After 'fly launch' this file is committed and referenced by all future
# 'fly deploy' calls.

app = "alfred-bridge"
primary_region = "yyz"
kill_signal = "SIGTERM"
kill_timeout = "8s"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"
  NODE_ENV = "production"
  BRIDGE_LOG_LEVEL = "info"
  BRIDGE_AUTH_PATH = "/data/auth-state"

[[mounts]]
  source = "alfred_auth"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
